# =============================================================================
# OVERRIDE LOCAL / VPS — NÃO confiar só neste ficheiro no EasyPanel
# =============================================================================
# EasyPanel (projeto agenciamart-ia / serviço vibestack-openclaw) usa apenas
# `docker-compose.easypanel.yml` como composeFile. Este override NÃO entra no
# Deploy Git do EasyPanel.
#
# Use este ficheiro quando subir com:
#   docker compose -f docker-compose.easypanel.yml -f docker-compose.override.yml up -d
# (ou compose default + override) em /opt/agenciamart-ia/vibestack-openclaw.
#
# NÃO PERDER no redeploy / Deploy cego:
#   1. .env na VPS (nunca no Git) — tokens Evolution/OpenClaw/Postgres
#   2. defaults bridge→Ollama (já em docker-compose.easypanel.yml)
#   3. redes easypanel + aliases Traefik (já no easypanel.yml)
#   4. volumes nomeados (openclaw-data, evolution-data, ollama-data, …)
#
# Antes de Deploy no EasyPanel: ler docs/DEPLOY-EASYPANEL.md
# =============================================================================

networks:
  easypanel:
    external: true

services:
  openclaw-vibestack:
    # Entrypoint do host (bridge CEDO + timeout MCP). Bind em path dedicado —
    # montar em cima de /usr/local/bin/entrypoint.sh falhou com "not a directory".
    entrypoint: ["/bin/sh", "/app/host-entrypoint.sh"]
    volumes:
      # Hot-fix middleware sem rebuild da imagem (fast-greeting etc.)
      - ./middleware:/app/middleware:ro
      - ./entrypoint.sh:/app/host-entrypoint.sh:ro
    container_name: openclaw-vibestack-wa
    ports: []
    environment:
      # Ollama CPU: contexto curto = 1ª resposta em tempo útil (<90s).
      - OLLAMA_CONTEXT_LENGTH=512
      - OLLAMA_NUM_CTX=512
      - OLLAMA_NUM_PARALLEL=1
      # Bridge WhatsApp → OpenClaw Diretor (orquestrador da agência).
      # NÃO aponta mais para Hermes/Ollama como cérebro do canal.
      - WA_BRIDGE_AGENT=openclaw
      - WA_BRIDGE_OPENCLAW_AGENT=diretor
      - WA_BRIDGE_ACK_AFTER=20
      - WA_BRIDGE_UPSTREAM_TIMEOUT=300
    networks:
      # Keep project default so DNS `evolution-go` / `openclaw-vibestack` works.
      default:
      easypanel:
        aliases:
          - agenciamart-ia_vibestack-openclaw_openclaw-vibestack
  evolution-go:
    networks:
      default:
      easypanel:
        aliases:
          - agenciamart-ia_vibestack-openclaw_evolution-go
  postgres:
    networks:
      - default
