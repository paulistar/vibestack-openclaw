services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-vibestack-openclaw:latest}
    build:
      context: .
      args:
        OPENCLAW_REF: ${OPENCLAW_REF:-main}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HOME=/home/node
      - NODE_ENV=production
      - TERM=xterm-256color
      - OPENCLAW_GATEWAY_BIND=${OPENCLAW_GATEWAY_BIND}
      - OPENCLAW_GATEWAY_PORT=${OPENCLAW_GATEWAY_PORT}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - GOG_KEYRING_PASSWORD=${GOG_KEYRING_PASSWORD}
      - XDG_CONFIG_HOME=${XDG_CONFIG_HOME}
      - OLLAMA_MODELS=/var/lib/ollama
      # Meta Ads CLI oficial le ACCESS_TOKEN/AD_ACCOUNT_ID; mantemos META_ACCESS_TOKEN
      # como alias historico para o .env nao mudar.
      - ACCESS_TOKEN=${META_ACCESS_TOKEN}
      - AD_ACCOUNT_ID=${META_AD_ACCOUNT_ID:-}
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN}
      - PATH=/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ${OLLAMA_DATA_DIR}:/var/lib/ollama
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT}:18789"
      # Loopback do host pra alcancar o ollama interno (opcional, SSH tunnel):
      #   ssh -N -L 11434:127.0.0.1:11434 root@VPS
      - "127.0.0.1:11434:11434"
    command:
      - "openclaw"
      - "gateway"
      - "--bind"
      - "${OPENCLAW_GATEWAY_BIND}"
      - "--port"
      - "${OPENCLAW_GATEWAY_PORT}"
      - "--allow-unconfigured"
