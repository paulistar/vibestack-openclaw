services:
  openclaw-vibestack:
    image: ${OPENCLAW_IMAGE:-vibestack-openclaw:latest}
    build:
      context: .
      args:
        OPENCLAW_REF: ${OPENCLAW_REF:-main}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      #- HOME=/root
      - NODE_ENV=production
      - TERM=xterm-256color
      - OPENCLAW_GATEWAY_BIND=${OPENCLAW_GATEWAY_BIND}
      - OPENCLAW_GATEWAY_PORT=${OPENCLAW_GATEWAY_PORT}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - GOG_KEYRING_PASSWORD=${GOG_KEYRING_PASSWORD}
      - OLLAMA_MODELS=/var/lib/ollama
      # Meta Ads CLI oficial le ACCESS_TOKEN/AD_ACCOUNT_ID; mantemos META_ACCESS_TOKEN
      # como alias historico para o .env nao mudar.
      - ACCESS_TOKEN=${META_ACCESS_TOKEN}
      - AD_ACCOUNT_ID=${META_AD_ACCOUNT_ID:-}
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN}
      - PATH=/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      # Hermes — api_server OpenAI-compatible (alternativa ao OpenClaw).
      # API_SERVER_KEY e' obrigatorio pro gateway subir o servidor na 8642.
      # As tools (meta-ads/media-editor) reusam as vars Meta/B2 ja definidas acima.
      - API_SERVER_KEY=${HERMES_API_SERVER_KEY:-}
      - HERMES_API_PORT=${HERMES_API_PORT:-8642}
      # Dashboard web do Hermes (pagina de gestao/chat) — porta separada da API.
      - HERMES_WEB_PORT=${HERMES_WEB_PORT:-9119}
      # WhatsApp via Evolution Go — o middleware MCP alcanca a API pelo DNS de
      # servico do compose (http://evolution-go:8080). Auth: GLOBAL (admin/create)
      # + token da instancia (send/qr/status).
      - EVOLUTION_BASE_URL=http://evolution-go:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-}
      - EVOLUTION_INSTANCE_TOKEN=${EVOLUTION_INSTANCE_TOKEN:-}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-default}
      # Bridge inbound do WhatsApp (webhook do Evolution -> agente -> resposta).
      # WA_BRIDGE_AGENT: quem responde o canal — 'hermes' (api_server) ou 'openclaw'
      # (CLI `openclaw agent`). WA_BRIDGE_ALLOWED_NUMBERS: CSV de numeros que podem
      # falar com o agente (vazio = qualquer um). Recomendado preencher.
      - WA_BRIDGE_AGENT=${WA_BRIDGE_AGENT:-hermes}
      - WA_BRIDGE_OPENCLAW_AGENT=${WA_BRIDGE_OPENCLAW_AGENT:-}
      - WA_BRIDGE_PORT=${WA_BRIDGE_PORT:-8765}
      - WA_BRIDGE_ALLOWED_NUMBERS=${WA_BRIDGE_ALLOWED_NUMBERS:-}
    volumes:
      # UM mount só, abrangendo tudo do OpenClaw
      - ${OPENCLAW_DATA_DIR}:/root/.openclaw
      # Ollama em mount separado (faz sentido — outro app)
      - ${OLLAMA_DATA_DIR}:/var/lib/ollama
      # Hermes — HERMES_HOME (config.yaml, .env, sessions, skills, memories).
      # Persistente pra que a config do provider editada pelo usuario sobreviva a rebuilds.
      # Default /root/.hermes funciona na VPS (HOME=/root); install.sh ajusta no Mac/Windows.
      - ${HERMES_DATA_DIR:-/root/.hermes}:/root/.hermes
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT}:18789"
      # Loopback do host pra alcancar o ollama interno (opcional, SSH tunnel):
      #   ssh -N -L 11434:127.0.0.1:11434 root@VPS
      - "127.0.0.1:11434:11434"
      # Hermes — API OpenAI-compatible (porta separada, coexiste com o OpenClaw):
      #   ssh -N -L 8642:127.0.0.1:8642 root@VPS  -> http://localhost:8642/v1
      - "127.0.0.1:${HERMES_API_PORT:-8642}:8642"
      # Hermes — dashboard web (pagina de gestao/chat):
      #   ssh -N -L 9119:127.0.0.1:9119 root@VPS  -> http://localhost:9119
      - "127.0.0.1:${HERMES_WEB_PORT:-9119}:9119"
    command:
      - "openclaw"
      - "gateway"
      - "--bind"
      - "${OPENCLAW_GATEWAY_BIND}"
      - "--port"
      - "${OPENCLAW_GATEWAY_PORT}"
      - "--allow-unconfigured"

  # ============================================================
  # WhatsApp backend — Evolution Go (whatsmeow) + Postgres.
  # Servicos irmaos na mesma rede default do compose; o container
  # openclaw-vibestack alcanca a API por http://evolution-go:8080.
  # A API so' e' publicada em loopback no host (Manager/QR via SSH tunnel).
  # ============================================================
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # POSTGRES_DB cria 'evogo_auth'; o init SQL cria 'evogo_users' tambem.
      - POSTGRES_DB=evogo_auth
    volumes:
      - ${POSTGRES_DATA_DIR:-/root/.evogo-pg}:/var/lib/postgresql/data
      # Cria os dois bancos que o Evolution Go espera no primeiro init.
      - ./postgres/init-evolution-dbs.sql:/docker-entrypoint-initdb.d/init-evolution-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  evolution-go:
    image: ${EVOLUTION_IMAGE:-evoapicloud/evolution-go:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SERVER_PORT=8080
      - GLOBAL_API_KEY=${EVOLUTION_API_KEY}
      - POSTGRES_AUTH_DB=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/evogo_auth?sslmode=disable
      - POSTGRES_USERS_DB=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/evogo_users?sslmode=disable
      - DATABASE_SAVE_MESSAGES=false
      # Webhook global: todo evento (inclusive mensagem recebida) vai pro bridge
      # inbound que roda no container openclaw-vibestack (DNS do compose).
      - WEBHOOK_URL=http://openclaw-vibestack:${WA_BRIDGE_PORT:-8765}/webhook
    volumes:
      - ${EVOLUTION_DATA_DIR:-/root/.evolution-go}:/app/data
    ports:
      # So' loopback no host — Manager/QR via SSH tunnel:
      #   ssh -N -L 8080:127.0.0.1:8080 root@VPS  -> http://localhost:8080/manager/login
      - "127.0.0.1:${EVOLUTION_PORT:-8080}:8080"
